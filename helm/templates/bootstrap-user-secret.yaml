apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bootstrap-admin-credentials
  namespace: keycloak
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: secrets-manager
    kind: SecretStore
  target:
    name: keycloak-bootstrap-user-secret
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: "auth-manager/bootstrap-admin-credentials"
        property: "username"
    - secretKey: password
      remoteRef:
        key: "auth-manager/bootstrap-admin-credentials"
        property: "password"
