apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bootstrap-service-credentials
  namespace: keycloak
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: secrets-manager
    kind: SecretStore
  target:
    name: keycloak-bootstrap-service-secret
    creationPolicy: Owner
  data:
    - secretKey: client-id
      remoteRef:
        key: "auth-manager/bootstrap-service-credentials"
        property: "clientId"
    - secretKey: client-secret
      remoteRef:
        key: "auth-manager/bootstrap-service-credentials"
        property: "client-secret"
